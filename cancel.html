<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Cancelled — 420 Beans</title>
<meta name="description" content="Your payment was cancelled. Return to the shop anytime.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body class="page-simple">

<nav id="mainNav">
  <a href="./" class="nav-logo">420 <span>Beans</span></a>
  <div class="nav-right">
    <div class="lang-switcher">
      <button class="lang-btn" id="btnBG" onclick="switchLang('bg')">БГ</button>
      <button class="lang-btn active" id="btnEN" onclick="switchLang('en')">EN</button>
    </div>
  </div>
</nav>

<main class="page-main">
  <div class="status-box">
    <div class="status-icon cancel">✕</div>
    <p class="status-eyebrow" id="eyebrow">Payment Cancelled</p>
    <h1 class="status-heading" id="heading">No <em>worries.</em></h1>
    <p class="status-desc" id="desc">
      Your payment was cancelled. Your cart items are still waiting for you — head back whenever you're ready.
    </p>
    <div class="status-actions">
      <a href="./#shop" class="btn-primary" id="shopBtn">Back to Shop</a>
      <a href="./"      class="btn-ghost"   id="homeBtn">← Home</a>
    </div>
  </div>
</main>

<footer class="page-footer">
  <p>© 2024 420 Beans. All rights reserved.</p>
</footer>

<script>
  const translations = {
    en: {
      title:   'Payment Cancelled — 420 Beans',
      eyebrow: 'Payment Cancelled',
      heading: 'No <em>worries.</em>',
      desc:    "Your payment was cancelled. Your cart items are still waiting for you — head back whenever you're ready.",
      shop:    'Back to Shop',
      home:    '← Home',
    },
    bg: {
      title:   'Плащането е отказано — 420 Beans',
      eyebrow: 'Плащането е отказано',
      heading: 'Няма <em>проблем.</em>',
      desc:    'Плащането беше отказано. Продуктите в количката ви все още ви чакат — върнете се когато сте готови.',
      shop:    'Обратно в магазина',
      home:    '← Начало',
    },
  };

  let currentLang = navigator.language?.startsWith('bg') ? 'bg' : 'en';

  function applyLang(l) {
    const tr = translations[l] || translations.en;
    document.title = tr.title;
    document.getElementById('eyebrow').textContent  = tr.eyebrow;
    document.getElementById('heading').innerHTML    = tr.heading;
    document.getElementById('desc').textContent     = tr.desc;
    document.getElementById('shopBtn').textContent  = tr.shop;
    document.getElementById('homeBtn').textContent  = tr.home;
    document.getElementById('btnBG').classList.toggle('active', l === 'bg');
    document.getElementById('btnEN').classList.toggle('active', l === 'en');
    document.documentElement.lang = l;
    currentLang = l;
  }

  function switchLang(l) { applyLang(l); }

  applyLang(currentLang);
</script>
</body>
</html>
