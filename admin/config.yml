# ─────────────────────────────────────────────────────────
# 420 Beans — Decap CMS Configuration
# Docs: https://decapcms.org/docs/configuration-options/
# ─────────────────────────────────────────────────────────

backend:
  name: github
  repo: ТВОЕТО_GITHUB_USERNAME/ТВОЕТО_REPO_NAME   # ← СМЕНИ ТОВА
  branch: main                                      # или master

# Позволява преглед на промени преди публикуване
publish_mode: editorial_workflow

# Папка за качени снимки
media_folder: "images"
public_folder: "./images"

# ─────────────────────────────────────────────────────────
# КОЛЕКЦИИ — всяка е отделна секция в CMS
# ─────────────────────────────────────────────────────────
collections:

  # ── 1. ПРОДУКТИ ──────────────────────────────────────
  - name: "products"
    label: "☕ Продукти / Products"
    label_singular: "Продукт"
    description: "Управлявай всички продукти — кафета и мърч"
    files:
      - name: "all_products"
        label: "Всички продукти"
        file: "products.json"
        description: "Редактирай продуктите, цените, описанията и снимките"
        fields:
          - label: "Продукти"
            name: "products"
            widget: "list"
            summary: "{{fields.en.name}} — €{{fields.price}}"
            fields:
              - label: "ID (не променяй!)"
                name: "id"
                widget: "string"
                hint: "Уникален идентификатор: p1, p2, m1 и т.н."

              - label: "Категория"
                name: "category"
                widget: "select"
                options:
                  - { label: "Кафе (Filter)", value: "filter" }
                  - { label: "Кафе / Еспресо", value: "filter espresso" }
                  - { label: "Еспресо", value: "espresso" }
                  - { label: "Мърч", value: "merch" }

              - label: "Бадж (badge)"
                name: "badge"
                widget: "select"
                required: false
                default: ""
                options:
                  - { label: "Няма", value: "" }
                  - { label: "Best Seller", value: "bestseller" }
                  - { label: "New", value: "new" }

              - label: "Снимка на продукта"
                name: "image"
                widget: "image"
                required: false
                allow_multiple: false
                hint: "Препоръчителен размер: 600×800px, формат WebP или JPG"

              - label: "Цена (€)"
                name: "price"
                widget: "number"
                min: 1
                max: 999
                step: 1
                hint: "Само числото — символът € се добавя автоматично"

              - label: "Степен на печене (0–100)"
                name: "roast"
                widget: "number"
                min: 0
                max: 100
                step: 1
                hint: "0 = светло, 100 = тъмно. За мърч остави 0."

              - label: "Stripe Payment Link"
                name: "stripeLink"
                widget: "string"
                hint: "URL от Stripe Dashboard → Payment Links"

              - label: "🇬🇧 Английски"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Регион / вид печене", name: "region", widget: "string" }
                  - { label: "Име на продукта", name: "name", widget: "string" }
                  - { label: "Метод на обработка", name: "process", widget: "string", required: false }
                  - { label: "Вкусови бележки", name: "notes", widget: "string", hint: "Разделени с ·" }

              - label: "🇧🇬 Български"
                name: "bg"
                widget: "object"
                fields:
                  - { label: "Регион / вид печене", name: "region", widget: "string" }
                  - { label: "Име на продукта", name: "name", widget: "string" }
                  - { label: "Метод на обработка", name: "process", widget: "string", required: false }
                  - { label: "Вкусови бележки", name: "notes", widget: "string", hint: "Разделени с ·" }

  # ── 2. НАСТРОЙКИ НА САЙТА ────────────────────────────
  - name: "settings"
    label: "⚙️ Настройки"
    files:

      - name: "site_settings"
        label: "Основни настройки"
        file: "_data/settings.json"
        fields:
          - label: "Stripe Publishable Key"
            name: "stripePublishableKey"
            widget: "string"
            hint: "pk_live_... или pk_test_... (НЕ secret key!)"
            default: "pk_test_REPLACE"

          - label: "Имейл за контакт"
            name: "contactEmail"
            widget: "string"
            default: "hello@420beans.com"

          - label: "Instagram URL"
            name: "instagramUrl"
            widget: "string"
            required: false

          - label: "Facebook URL"
            name: "facebookUrl"
            widget: "string"
            required: false

          - label: "TikTok URL"
            name: "tiktokUrl"
            widget: "string"
            required: false

      - name: "hero"
        label: "Hero секция (начална страница)"
        file: "_data/hero.json"
        fields:
          - label: "🇬🇧 Eyebrow текст (малкият надпис)"
            name: "eyebrowEN"
            widget: "string"
            default: "Specialty Coffee — Est. 2024"

          - label: "🇧🇬 Eyebrow текст"
            name: "eyebrowBG"
            widget: "string"
            default: "Специалти Кафе — Осн. 2024"

          - label: "🇬🇧 Описание под заглавието"
            name: "descEN"
            widget: "text"
            default: "Carefully selected high-quality coffee, focused on flavour profile and traceable single-farm origin."

          - label: "🇧🇬 Описание под заглавието"
            name: "descBG"
            widget: "text"
            default: "Подбираме внимателно висококачествено кафе с фокус върху вкусовия профил и проследим произход до конкретни ферми."
