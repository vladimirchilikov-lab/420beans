# ─────────────────────────────────────────────────────────
# 420 Beans — Sveltia CMS config
# ─────────────────────────────────────────────────────────

backend:
  name: github
  repo: СМЕНИ/420beans             # ← напр. vladimirchilikov/420beans
  branch: main
  auth_type: implicit
  app_id: СМЕНИ_CLIENT_ID          # ← GitHub OAuth App → Client ID

site_url: https://СМЕНИ.vercel.app # ← твоят Vercel URL

media_folder: "images"
public_folder: "/images"

collections:

  - name: "products"
    label: "☕ Продукти"
    label_singular: "Продукт"
    files:
      - name: "all_products"
        label: "Всички продукти"
        file: "products.json"
        fields:
          - label: "Продукти"
            name: "products"
            widget: "list"
            summary: "{{fields.en.name}} — €{{fields.price}}"
            fields:
              - { label: "ID",    name: "id",    widget: "string" }
              - label: "Категория"
                name: "category"
                widget: "select"
                options:
                  - { label: "Кафе (Filter)",  value: "filter" }
                  - { label: "Кафе / Еспресо", value: "filter espresso" }
                  - { label: "Еспресо",        value: "espresso" }
                  - { label: "Мърч",           value: "merch" }
              - label: "Badge"
                name: "badge"
                widget: "select"
                required: false
                default: ""
                options:
                  - { label: "Няма",        value: "" }
                  - { label: "Best Seller", value: "bestseller" }
                  - { label: "New",         value: "new" }
              - { label: "Снимка",             name: "image",      widget: "image",  required: false }
              - { label: "Цена (€)",           name: "price",      widget: "number", min: 1, max: 9999, value_type: "int" }
              - { label: "Степен на печене",   name: "roast",      widget: "number", min: 0, max: 100,  value_type: "int" }
              - { label: "Stripe Payment Link",name: "stripeLink", widget: "string" }
              - label: "🇬🇧 Английски"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Регион", name: "region",  widget: "string" }
                  - { label: "Ime",   name: "name",    widget: "string" }
                  - { label: "Процес", name: "process", widget: "string", required: false }
                  - { label: "Вкус",  name: "notes",   widget: "string" }
              - label: "🇧🇬 Български"
                name: "bg"
                widget: "object"
                fields:
                  - { label: "Регион", name: "region",  widget: "string" }
                  - { label: "Ime",   name: "name",    widget: "string" }
                  - { label: "Процес", name: "process", widget: "string", required: false }
                  - { label: "Вкус",  name: "notes",   widget: "string" }

  - name: "settings"
    label: "⚙️ Настройки"
    files:
      - name: "site_settings"
        label: "Основни настройки"
        file: "_data/settings.json"
        fields:
          - { label: "Stripe Publishable Key", name: "stripePublishableKey", widget: "string" }
          - { label: "Контактен имейл",        name: "contactEmail",         widget: "string" }
          - { label: "Instagram URL",          name: "instagramUrl",         widget: "string", required: false }
          - { label: "Facebook URL",           name: "facebookUrl",          widget: "string", required: false }
          - { label: "TikTok URL",             name: "tiktokUrl",            widget: "string", required: false }
      - name: "hero"
        label: "Hero секция"
        file: "_data/hero.json"
        fields:
          - { label: "🇬🇧 Eyebrow", name: "eyebrowEN", widget: "string" }
          - { label: "🇧🇬 Eyebrow", name: "eyebrowBG", widget: "string" }
          - { label: "🇬🇧 Описание", name: "descEN",   widget: "text" }
          - { label: "🇧🇬 Описание", name: "descBG",   widget: "text" }
