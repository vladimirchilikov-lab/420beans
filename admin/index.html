<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>420 Beans Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8f04a;
      --accent-dim: #a8cc32;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #ff4d4d;
      --radius: 6px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* LOGIN */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }

    .login-box .logo {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-box .tagline {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .login-box input:focus { border-color: var(--accent); }

    .login-error {
      color: var(--danger);
      font-size: 12px;
      margin-bottom: 12px;
      min-height: 16px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0e;
      width: 100%;
      justify-content: center;
      font-size: 14px;
      padding: 12px;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* ADMIN LAYOUT */
    #admin-screen { display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar .brand {
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
    }

    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
    }

    /* PRODUCT TABLE */
    .products-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .products-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .products-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .products-table tr:last-child td { border-bottom: none; }

    .products-table tr:hover td { background: rgba(255,255,255,0.02); }

    .product-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 4px;
      background: var(--border);
    }

    .product-img-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .price-badge {
      font-family: monospace;
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }

    .category-tag {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(200, 240, 74, 0.1);
      color: var(--accent-dim);
      border-radius: 4px;
      font-size: 11px;
    }

    .td-actions { display: flex; gap: 6px; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 520px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 64px);
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title { font-size: 16px; font-weight: 600; }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 24px; }

    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    /* FORM */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus { border-color: var(--accent); }

    .form-textarea { resize: vertical; min-height: 80px; }

    .price-input-wrap { position: relative; }

    .price-input-wrap .currency {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    .price-input-wrap .form-input { padding-left: 28px; }

    .image-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }

    .image-upload-area:hover { border-color: var(--accent); }

    .image-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
    }

    .image-preview {
      max-width: 100%;
      max-height: 120px;
      border-radius: 4px;
      margin-top: 8px;
    }

    .upload-hint { color: var(--muted); font-size: 12px; }
    .upload-hint strong { color: var(--text); }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.success { border-color: var(--accent); color: var(--accent); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { margin-bottom: 20px; }

    /* LOADING */
    .loading { text-align: center; padding: 48px; color: var(--muted); }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* DELETE CONFIRM */
    .delete-modal-body { padding: 24px; text-align: center; }
    .delete-modal-body p { color: var(--muted); margin-top: 8px; font-size: 13px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">420 Beans</div>
    <div class="tagline">Admin Panel</div>
    <input type="password" id="pw-input" placeholder="Парола" />
    <div class="login-error" id="login-error"></div>
    <button class="btn btn-primary" onclick="doLogin()">Влез</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="topbar">
    <div class="brand">☕ 420 Beans Admin</div>
    <div class="topbar-actions">
      <button class="btn btn-secondary btn-sm" onclick="logout()">Изход</button>
    </div>
  </div>

  <div class="main">
    <div class="section-header">
      <div class="section-title">Продукти</div>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Нов продукт</button>
    </div>

    <div id="products-container">
      <div class="loading"><span class="spinner"></span> Зареждане...</div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Нов продукт</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Име</label>
        <input class="form-input" id="f-name" placeholder="Например: Ethiopia Yirgacheffe" />
      </div>
      <div class="form-group">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" id="f-desc" placeholder="Вкусов профил, произход..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Цена (EUR)</label>
        <div class="price-input-wrap">
          <span class="currency">€</span>
          <input class="form-input" id="f-price" type="number" step="0.01" min="0" placeholder="12.00" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Категория</label>
        <input class="form-input" id="f-category" placeholder="espresso / filter / blend" />
      </div>
      <div class="form-group">
        <label class="form-label">Снимка</label>
        <div class="image-upload-area" id="upload-area">
          <input type="file" id="f-image" accept="image/*" onchange="handleImageSelect(event)" />
          <div id="upload-placeholder">
            <div style="font-size:24px;margin-bottom:8px">📷</div>
            <div class="upload-hint"><strong>Избери снимка</strong> или провлачи тук</div>
            <div class="upload-hint" style="margin-top:4px">JPG, PNG, WEBP</div>
          </div>
          <img id="image-preview" class="image-preview" style="display:none" />
        </div>
        <input type="hidden" id="f-image-url" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Откажи</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveProduct()">Запази</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" style="width:400px">
    <div class="modal-header">
      <div class="modal-title">Изтриване</div>
      <button class="modal-close" onclick="closeDeleteModal()">×</button>
    </div>
    <div class="delete-modal-body">
      <div style="font-size:36px">🗑️</div>
      <p>Сигурен ли си? Това действие е необратимо.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">Откажи</button>
      <button class="btn btn-danger" id="confirm-delete-btn" onclick="confirmDelete()">Изтрий</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://qgqgxlzrvltzmtpnldfx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFncWd4bHpydmx0em10cG5sZGZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA3MjgsImV4cCI6MjA5MzAzNjcyOH0.pkhjrZYilK_htUSBE-1Sbjzt-8-7zn28D8mUK3rVIXg';
  const BUCKET = 'products';
  const PASSWORD = '420.beans';

  let products = [];
  let editingId = null;
  let deleteId = null;
  let selectedFile = null;

  // ── AUTH ──────────────────────────────────────────────
  function doLogin() {
    const val = document.getElementById('pw-input').value;
    if (val === PASSWORD) {
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadProducts();
    } else {
      document.getElementById('login-error').textContent = 'Грешна парола';
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function logout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  if (sessionStorage.getItem('admin_auth')) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadProducts();
  }

  // ── SUPABASE HELPERS ──────────────────────────────────
  async function sbFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...options,
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...(options.headers || {})
      }
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function uploadImage(file) {
    const ext = file.name.split('.').pop();
    const filename = `product-${Date.now()}.${ext}`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': file.type,
        'Cache-Control': '3600',
        'x-upsert': 'true'
      },
      body: file
    });
    if (!res.ok) throw new Error('Upload failed');
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${filename}`;
  }

  // ── LOAD PRODUCTS ─────────────────────────────────────
  async function loadProducts() {
    try {
      products = await sbFetch('products?order=created_at.desc&select=*');
      renderProducts();
    } catch (e) {
      document.getElementById('products-container').innerHTML =
        `<div class="empty-state"><div class="icon">⚠️</div><p>Грешка при зареждане: ${e.message}</p></div>`;
    }
  }

  function renderProducts() {
    const container = document.getElementById('products-container');
    if (!products.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📦</div>
          <p>Няма продукти още</p>
          <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Добави първия продукт</button>
        </div>`;
      return;
    }

    container.innerHTML = `
      <table class="products-table">
        <thead>
          <tr>
            <th>Снимка</th>
            <th>Име</th>
            <th>Цена</th>
            <th>Категория</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody>
          ${products.map(p => `
            <tr>
              <td>
                ${p.image_url
                  ? `<img class="product-img" src="${p.image_url}" alt="${p.name}" />`
                  : `<div class="product-img-placeholder">☕</div>`}
              </td>
              <td>
                <div style="font-weight:500">${p.name}</div>
                ${p.description ? `<div style="color:var(--muted);font-size:12px;margin-top:2px">${p.description.substring(0, 60)}${p.description.length > 60 ? '…' : ''}</div>` : ''}
              </td>
              <td><span class="price-badge">€${(p.price / 100).toFixed(2)}</span></td>
              <td>${p.category ? `<span class="category-tag">${p.category}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
              <td>
                <div class="td-actions">
                  <button class="btn btn-secondary btn-sm" onclick="openEditModal('${p.id}')">✏️ Редактирай</button>
                  <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${p.id}')">🗑️</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // ── ADD / EDIT MODAL ──────────────────────────────────
  function openAddModal() {
    editingId = null;
    selectedFile = null;
    document.getElementById('modal-title').textContent = 'Нов продукт';
    document.getElementById('f-name').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-category').value = '';
    document.getElementById('f-image-url').value = '';
    document.getElementById('f-image').value = '';
    document.getElementById('image-preview').style.display = 'none';
    document.getElementById('upload-placeholder').style.display = 'block';
    document.getElementById('product-modal').classList.add('open');
  }

  function openEditModal(id) {
    const p = products.find(x => x.id == id);
    if (!p) return;
    editingId = id;
    selectedFile = null;
    document.getElementById('modal-title').textContent = 'Редактирай продукт';
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-desc').value = p.description || '';
    document.getElementById('f-price').value = p.price ? (p.price / 100).toFixed(2) : '';
    document.getElementById('f-category').value = p.category || '';
    document.getElementById('f-image-url').value = p.image_url || '';
    document.getElementById('f-image').value = '';

    const preview = document.getElementById('image-preview');
    const placeholder = document.getElementById('upload-placeholder');
    if (p.image_url) {
      preview.src = p.image_url;
      preview.style.display = 'block';
      placeholder.style.display = 'none';
    } else {
      preview.style.display = 'none';
      placeholder.style.display = 'block';
    }
    document.getElementById('product-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('product-modal').classList.remove('open');
  }

  function handleImageSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      const preview = document.getElementById('image-preview');
      preview.src = e.target.result;
      preview.style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  async function saveProduct() {
    const name = document.getElementById('f-name').value.trim();
    const description = document.getElementById('f-desc').value.trim();
    const priceEur = parseFloat(document.getElementById('f-price').value);
    const category = document.getElementById('f-category').value.trim();
    let image_url = document.getElementById('f-image-url').value;

    if (!name) { toast('Въведи име на продукта', 'error'); return; }
    if (isNaN(priceEur) || priceEur < 0) { toast('Въведи валидна цена', 'error'); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Запазване...';

    try {
      // Upload image if selected
      if (selectedFile) {
        toast('Качване на снимка...', 'success');
        image_url = await uploadImage(selectedFile);
      }

      const price = Math.round(priceEur * 100);
      const payload = { name, description, price, image_url, category };

      if (editingId) {
        await sbFetch(`products?id=eq.${editingId}`, {
          method: 'PATCH',
          body: JSON.stringify(payload)
        });
        toast('Продуктът е обновен ✓', 'success');
      } else {
        await sbFetch('products', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        toast('Продуктът е добавен ✓', 'success');
      }

      closeModal();
      await loadProducts();
    } catch (e) {
      toast('Грешка: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Запази';
    }
  }

  // ── DELETE ────────────────────────────────────────────
  function openDeleteModal(id) {
    deleteId = id;
    document.getElementById('delete-modal').classList.add('open');
  }

  function closeDeleteModal() {
    document.getElementById('delete-modal').classList.remove('open');
    deleteId = null;
  }

  async function confirmDelete() {
    if (!deleteId) return;
    const btn = document.getElementById('confirm-delete-btn');
    btn.disabled = true;
    try {
      await sbFetch(`products?id=eq.${deleteId}`, { method: 'DELETE' });
      toast('Продуктът е изтрит', 'success');
      closeDeleteModal();
      await loadProducts();
    } catch (e) {
      toast('Грешка: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  // ── TOAST ─────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }
</script>
</body>
</html>
