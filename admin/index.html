<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>420 Beans Admin</title>
</head>
<body>

<script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    if (!window.CMS) {
      console.error("CMS failed to load");
      return;
    }

    // 🔒 FORCE disable any legacy fallback behavior
    window.CMS_MANUAL_INIT = false;

    window.CMS.init();
  });
</script>

</body>
</html>
