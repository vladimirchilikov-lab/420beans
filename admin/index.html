<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>420 Beans — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
</head>
<body>

  <!-- Decap CMS requires this div to exist before the script runs -->
  <div id="nc-root"></div>

  <!--
    Config is inlined as a script tag — avoids the config.yml 404 problem
    that happens when Vercel rewrites /admin/ to admin/index.html
  -->
  <script>
    // Decap CMS reads window.CMS_MANUAL_INIT and window.decapCmsConfig
    // if they exist before the main bundle loads.
    window.CMS_MANUAL_INIT = true;
  </script>

  <!-- jsDelivr with exact version — does not redirect to latest -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.1.2/dist/decap-cms.js"></script>

  <script>
    // Initialize CMS manually with config object — no config.yml needed
    CMS.init({
      config: {
        // ─── BACKEND ──────────────────────────────────────────────
        // СМЕНИ repo с твоето GitHub username/repo
        backend: {
          name: 'github',
          repo: 'vladimirchilikov-lab/420beans',   // ← СМЕНИ (напр. vladimirchilikov/420beans)
          branch: 'main',
          auth_type: 'implicit',
          app_id: 'Ov23lijJAp6XItk16oBj',  // ← СМЕНИ (от GitHub OAuth App)
        },

        // ─── SITE URL ─────────────────────────────────────────────
        site_url: 'https://420beans.vercel.app', // ← СМЕНИ

        // ─── MEDIA ────────────────────────────────────────────────
        media_folder: 'images',
        public_folder: './images',

        // ─── COLLECTIONS ──────────────────────────────────────────
        collections: [
          // ── ПРОДУКТИ ────────────────────────────────────────────
          {
            name: 'products',
            label: '☕ Продукти',
            label_singular: 'Продукт',
            description: 'Редактирай кафета, мърч, цени и снимки',
            files: [
              {
                name: 'all_products',
                label: 'Всички продукти',
                file: 'products.json',
                fields: [
                  {
                    label: 'Продукти',
                    name: 'products',
                    widget: 'list',
                    summary: '{{fields.en.name}} — €{{fields.price}}',
                    fields: [
                      { label: 'ID',        name: 'id',       widget: 'string' },
                      {
                        label: 'Категория', name: 'category', widget: 'select',
                        options: [
                          { label: 'Кафе (Filter)',       value: 'filter' },
                          { label: 'Кафе / Еспресо',      value: 'filter espresso' },
                          { label: 'Еспресо',             value: 'espresso' },
                          { label: 'Мърч',                value: 'merch' },
                        ],
                      },
                      {
                        label: 'Badge',     name: 'badge',    widget: 'select', required: false,
                        options: [
                          { label: 'Няма',        value: '' },
                          { label: 'Best Seller', value: 'bestseller' },
                          { label: 'New',         value: 'new' },
                        ],
                      },
                      { label: 'Снимка',           name: 'image',       widget: 'image',  required: false },
                      { label: 'Цена (€)',          name: 'price',       widget: 'number', min: 1, max: 9999, value_type: 'int' },
                      { label: 'Степен на печене', name: 'roast',       widget: 'number', min: 0, max: 100, value_type: 'int', hint: '0 = светло, 100 = тъмно. За мърч: 0' },
                      { label: 'Stripe Payment Link', name: 'stripeLink', widget: 'string', hint: 'https://buy.stripe.com/...' },
                      {
                        label: '🇬🇧 Английски', name: 'en', widget: 'object',
                        fields: [
                          { label: 'Регион / печене', name: 'region',  widget: 'string' },
                          { label: 'Име',             name: 'name',    widget: 'string' },
                          { label: 'Процес',          name: 'process', widget: 'string', required: false },
                          { label: 'Вкусови бележки',name: 'notes',   widget: 'string' },
                        ],
                      },
                      {
                        label: '🇧🇬 Български', name: 'bg', widget: 'object',
                        fields: [
                          { label: 'Регион / печене', name: 'region',  widget: 'string' },
                          { label: 'Ime',             name: 'name',    widget: 'string' },
                          { label: 'Процес',          name: 'process', widget: 'string', required: false },
                          { label: 'Вкусови бележки',name: 'notes',   widget: 'string' },
                        ],
                      },
                    ],
                  },
                ],
              },
            ],
          },

          // ── НАСТРОЙКИ ───────────────────────────────────────────
          {
            name: 'settings',
            label: '⚙️ Настройки',
            files: [
              {
                name: 'site_settings',
                label: 'Основни настройки',
                file: '_data/settings.json',
                fields: [
                  { label: 'Stripe Publishable Key', name: 'stripePublishableKey', widget: 'string', hint: 'pk_live_... или pk_test_...' },
                  { label: 'Контактен имейл',        name: 'contactEmail',          widget: 'string' },
                  { label: 'Instagram URL',           name: 'instagramUrl',          widget: 'string', required: false },
                  { label: 'Facebook URL',            name: 'facebookUrl',           widget: 'string', required: false },
                  { label: 'TikTok URL',              name: 'tiktokUrl',             widget: 'string', required: false },
                ],
              },
              {
                name: 'hero',
                label: 'Hero секция',
                file: '_data/hero.json',
                fields: [
                  { label: '🇬🇧 Eyebrow текст', name: 'eyebrowEN', widget: 'string' },
                  { label: '🇧🇬 Eyebrow текст', name: 'eyebrowBG', widget: 'string' },
                  { label: '🇬🇧 Описание',      name: 'descEN',    widget: 'text' },
                  { label: '🇧🇬 Описание',      name: 'descBG',    widget: 'text' },
                ],
              },
            ],
          },
        ],
      },
    });
  </script>

</body>
</html>
